# DevScope Log Demo — nRF54L15 DK
# Generates log messages at all severity levels via both RTT and UART

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_USE_SEGGER_RTT=y

# Enable BOTH backends for comparison
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=y

# Console over UART (so printk goes to serial terminal)
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=n
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# RTT buffer configuration
CONFIG_SEGGER_RTT_MAX_NUM_UP_BUFFERS=3
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=16384
CONFIG_SEGGER_RTT_MODE_NO_BLOCK_SKIP=y

# Log level — INFO for kernel, DEBUG for app modules
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MAX_LEVEL=4

# Increase Zephyr log buffer to avoid internal drops
CONFIG_LOG_BUFFER_SIZE=8192
