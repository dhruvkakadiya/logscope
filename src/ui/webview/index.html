<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}'; img-src {{cspSource}};"
  />
  <link rel="stylesheet" href="{{stylesUri}}" />
  <title>LogScope</title>
</head>
<body>

  <!-- ── State 1: Disconnected (Welcome/Setup) ─────────────── -->
  <div id="welcome" class="state">
    <div id="welcome-inner">
      <div id="welcome-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="18" rx="2" />
          <path d="M5 12 Q7 4, 9 12 Q11 20, 13 12 Q15 4, 17 12 L19 12" />
        </svg>
      </div>
      <h1>LogScope<sup class="tm">TM</sup></h1>
      <p class="subtitle">Real-Time Embedded Log Viewer</p>

      <div id="connect-form">
        <div class="form-group">
          <span class="form-label">Device</span>
          <div id="device-row">
            <div id="device-picker">
              <button id="device-picker-btn" type="button">
                <span id="device-picker-text">Scanning...</span>
                <span class="chevron">&#x25BE;</span>
              </button>
              <div id="device-picker-list" class="hidden"></div>
            </div>
            <input id="cfg-device" type="hidden" value="" />
            <button id="refresh-btn" title="Refresh device list">&#x21bb;</button>
          </div>
          <span class="form-hint">Connects via J-Link RTT</span>
        </div>

        <div id="connect-error" class="hidden"></div>

        <label id="auto-connect-label">
          <input id="cfg-auto-connect" type="checkbox" />
          Connect automatically on open
        </label>

        <button id="connect-btn">Connect</button>
      </div>

      <div id="welcome-footer">
        <a id="novelbits-link" href="#">
          <img src="{{logoUri}}" alt="Novel Bits" height="36" />
          <span>by Novel Bits</span>
        </a>
      </div>
    </div>
  </div>

  <!-- ── State 2: Connected (Log Viewer) ───────────────────── -->
  <div id="viewer" class="state hidden">

    <!-- Connection bar -->
    <div id="connection-bar">
      <div id="conn-info">
        <div id="conn-top">
          <span class="dot green"></span>
          <span>Connected via J-Link RTT</span>
        </div>
        <div id="conn-device"></div>
      </div>
      <div id="conn-actions">
        <button id="export-btn" class="conn-btn" title="Export logs">Export</button>
        <button id="settings-btn" class="conn-btn" title="Settings (click again to collapse)">Settings</button>
        <button id="disconnect-btn" class="conn-btn disconnect" title="Disconnect">Disconnect</button>
      </div>
    </div>

    <!-- Inline settings (toggled by gear icon) -->
    <div id="inline-settings" class="hidden">
      <div id="inline-settings-inner">
        <label>
          RTT Address (override)
          <input id="cfg-rtt-address-inline" type="text" placeholder="auto" spellcheck="false" />
        </label>
        <span class="hint">Leave empty for auto-detect. Changes take effect on next reconnect.</span>
      </div>
    </div>

    <!-- Reconnect bar (unexpected disconnect) -->
    <div id="reconnect-bar" class="hidden">
      <span class="dot amber"></span>
      <span>Connection lost</span>
      <button id="reconnect-btn">Reconnect</button>
      <button id="dismiss-btn">Dismiss</button>
    </div>

    <!-- Filter bar -->
    <div id="filter-bar">
      <div id="filter-left">
        <button id="timestamp-btn" class="filter-toggle active" title="Show/hide timestamps">Time</button>
        <div id="severity-toggles">
          <button class="severity-btn hci-btn active" data-severity="hci">HCI</button>
          <button class="severity-btn active" data-severity="err">ERR</button>
          <button class="severity-btn active" data-severity="wrn">WRN</button>
          <button class="severity-btn active" data-severity="inf">INF</button>
          <button class="severity-btn active" data-severity="dbg">DBG</button>
        </div>
        <div id="module-picker" class="mini-picker">
          <button id="module-picker-btn" type="button" class="mini-picker-btn">
            <span id="module-picker-text">All modules</span>
            <span class="chevron">&#x25BE;</span>
          </button>
          <div id="module-picker-list" class="mini-picker-list hidden"></div>
        </div>
        <select id="module-select" class="hidden">
          <option value="">All modules</option>
        </select>
      </div>

      <input id="search-input" type="text" placeholder="Search logs..." spellcheck="false" />

      <div id="filter-right">
        <button id="wrap-btn" class="filter-toggle" title="Toggle line wrap">Wrap</button>
        <button id="auto-scroll-btn" class="filter-toggle active" title="Auto-scroll">Auto &#x2193;</button>
        <button id="clear-btn" class="filter-toggle" title="Clear timeline">Clear</button>
      </div>
    </div>

    <!-- Timeline -->
    <div id="timeline-wrapper">
      <div id="timeline"></div>
      <div id="end-of-log" class="hidden">end of log</div>
      <div id="new-data-bar" class="hidden">&#x2193; New log entries</div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-connection">Connected</span>
      <span id="status-count">0 entries</span>
      <span id="status-evicted"></span>
    </div>
  </div>

  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
