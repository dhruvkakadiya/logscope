<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}'; img-src {{cspSource}};"
  />
  <link rel="stylesheet" href="{{stylesUri}}" />
  <title>LogScope</title>
</head>
<body>

  <!-- ── Log Viewer (always visible) ───────────────────────── -->
  <div id="viewer">

    <!-- Connection bar -->
    <div id="connection-bar">
      <div id="conn-left">
        <button id="connect-toggle-btn" class="conn-btn connect" title="Connect">Connect</button>
        <span id="conn-status-dot" class="dot amber"></span>
        <span id="conn-status-text">Disconnected</span>
        <span id="conn-device"></span>
      </div>
      <div id="conn-actions">
        <button id="export-btn" class="conn-btn" title="Export logs">Export</button>
      </div>
    </div>

    <!-- Reconnect bar (unexpected disconnect) -->
    <div id="reconnect-bar" class="hidden">
      <span class="dot amber"></span>
      <span>Connection lost</span>
      <button id="reconnect-btn" title="Reconnect to last device">Reconnect</button>
      <button id="dismiss-btn" title="Dismiss notification">Dismiss</button>
    </div>

    <!-- Filter bar -->
    <div id="filter-bar">
      <div id="filter-left">
        <button id="timestamp-btn" class="filter-toggle active" title="Show/hide device timestamps">Timestamp</button>
        <div id="severity-toggles">
          <button id="check-all-btn" class="severity-meta-btn" title="Enable all (except MON)">&#10003;</button>
          <button id="uncheck-all-btn" class="severity-meta-btn" title="Disable all">&#10007;</button>
          <button class="severity-btn hci-btn active" data-severity="hci" title="Bluetooth LE HCI packets">HCI</button>
          <button class="severity-btn mon-btn" data-severity="mon" title="BT Monitor mirrored logs (off by default)">MON</button>
          <button class="severity-btn active" data-severity="err" title="Error level logs">ERR</button>
          <button class="severity-btn active" data-severity="wrn" title="Warning level logs">WRN</button>
          <button class="severity-btn active" data-severity="inf" title="Info level logs">INF</button>
          <button class="severity-btn active" data-severity="dbg" title="Debug level logs">DBG</button>
        </div>
        <div id="module-picker" class="mini-picker">
          <button id="module-picker-btn" type="button" class="mini-picker-btn" title="Filter by module">
            <span id="module-picker-text">All modules</span>
            <span class="chevron">&#x25BE;</span>
          </button>
          <div id="module-picker-list" class="mini-picker-list hidden"></div>
        </div>
        <select id="module-select" class="hidden">
          <option value="">All modules</option>
        </select>
      </div>

      <input id="search-input" type="text" placeholder="Search logs..." spellcheck="false" title="Search by message, module, level, or timestamp" />

      <div id="filter-right">
        <button id="wrap-btn" class="filter-toggle" title="Toggle line wrap">Wrap</button>
        <button id="auto-scroll-btn" class="filter-toggle active" title="Auto-scroll">Auto &#x2193;</button>
        <button id="clear-btn" class="filter-toggle" title="Clear timeline">Clear</button>
      </div>
    </div>

    <!-- Column headers -->
    <div id="column-headers">
      <span class="col-time">Time</span>
      <span class="col-ts">Timestamp</span>
      <span class="col-sev">Level</span>
      <span class="col-mod">Module</span>
      <span class="col-msg">Message</span>
    </div>

    <!-- Timeline -->
    <div id="timeline-wrapper">
      <div id="timeline">
        <div id="end-of-log" class="hidden">end of log</div>
      </div>
      <div id="new-data-bar" class="hidden">&#x2193; New log entries</div>
    </div>

    <!-- Status bar -->
    <div id="status-bar">
      <span id="status-connection">Disconnected</span>
      <span id="status-count">0 entries</span>
      <span id="status-evicted"></span>
    </div>
  </div>

  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
